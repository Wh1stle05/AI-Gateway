server:
  addr: ":8080"

metrics:
  enabled: true
  path: /metrics

rate_limit:
  enabled: true
  redis_url: redis://127.0.0.1:6379/0
  requests_per_minute: 600
  burst: 50

circuit_breaker:
  enabled: true
  failure_threshold: 5
  open_timeout: 30s
  half_open_max_requests: 2

providers:
  - name: mock
    type: mock
    models:
      - mock-model

routing:
  - model: mock-model
    provider: mock
