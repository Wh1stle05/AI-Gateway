services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  gateway:
    build: ..
    ports:
      - "8080:8080"
    depends_on:
      - redis
    volumes:
      - ../config.yaml:/app/config.yaml:ro
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GATEWAY_API_KEY: ${GATEWAY_API_KEY:-}
    restart: unless-stopped
