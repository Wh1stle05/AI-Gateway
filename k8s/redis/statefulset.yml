apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ai-gateway-redis
  namespace: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway-redis
spec:
  serviceName: ai-gateway-redis
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-gateway-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-gateway-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - name: redis
              containerPort: 6379
          command:
            - redis-server
            - "--maxmemory"
            - "128mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
