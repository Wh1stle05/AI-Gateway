apiVersion: v1
kind: Service
metadata:
  name: ai-gateway-redis
  namespace: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway-redis
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
  selector:
    app.kubernetes.io/name: ai-gateway-redis
