apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-gateway-config
  namespace: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway
data:
  config.yaml: |
    server:
      addr: ":8080"

    metrics:
      enabled: true
      path: /metrics

    rate_limit:
      enabled: true
      redis_url: redis://ai-gateway-redis:6379/0
      requests_per_minute: 120
      burst: 20

    circuit_breaker:
      enabled: true
      failure_threshold: 5
      open_timeout: 30s
      half_open_max_requests: 2

    providers:
      - name: openai
        type: openai
        base_url: https://api.openai.com/v1
        api_key: ${OPENAI_API_KEY}
        timeout: 120s
        models:
          - gpt-4o-mini
          - gpt-4o

      - name: mock
        type: mock
        models:
          - mock-model

    routing:
      - model: gpt-4o-mini
        provider: openai
        fallback: mock
      - model: mock-model
        provider: mock
