apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-gateway
  namespace: ai-gateway
  labels:
    app.kubernetes.io/name: ai-gateway
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ai-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ai-gateway
      ports:
        - port: 8080
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              app.kubernetes.io/name: ai-gateway
      ports:
        - port: 6379
          protocol: TCP
    - to: []
      ports:
        - port: 443
          protocol: TCP
        - port: 80
          protocol: TCP
