apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: ai-gateway
  labels:
    app.kubernetes.io/name: grafana
data:
  ai-gateway.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Request Rate (QPS)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(aigateway_http_requests_total[5m])) by (path)",
              "legendFormat": "{{path}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "HTTP Request Latency (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(aigateway_http_request_duration_seconds_bucket[5m])) by (le, path))",
              "legendFormat": "p50 {{path}}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(aigateway_http_request_duration_seconds_bucket[5m])) by (le, path))",
              "legendFormat": "p95 {{path}}",
              "refId": "B"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(aigateway_http_request_duration_seconds_bucket[5m])) by (le, path))",
              "legendFormat": "p99 {{path}}",
              "refId": "C"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 5 }
            }
          }
        },
        {
          "title": "Chat Requests by Model",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(aigateway_chat_requests_total[5m])) by (model, stream)",
              "legendFormat": "{{model}} stream={{stream}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Token Usage by Model",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum(rate(aigateway_chat_tokens_total[5m])) by (model, type)",
              "legendFormat": "{{model}} {{type}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 }
            }
          }
        },
        {
          "title": "Error Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            {
              "expr": "sum(rate(aigateway_chat_errors_total[5m])) by (error_type)",
              "legendFormat": "{{error_type}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 20 }
            }
          }
        },
        {
          "title": "Provider Request Latency",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(aigateway_provider_request_duration_seconds_bucket[5m])) by (le, provider))",
              "legendFormat": "p95 {{provider}}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.50, sum(rate(aigateway_provider_request_duration_seconds_bucket[5m])) by (le, provider))",
              "legendFormat": "p50 {{provider}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 5 }
            }
          }
        },
        {
          "title": "Circuit Breaker State",
          "type": "stat",
          "gridPos": { "h": 6, "w": 8, "x": 0, "y": 24 },
          "targets": [
            {
              "expr": "aigateway_circuit_breaker_state",
              "legendFormat": "{{provider}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "options": { "0": { "text": "Closed", "color": "green" }, "1": { "text": "Open", "color": "red" }, "2": { "text": "Half-Open", "color": "yellow" } }, "type": "value" }
              ]
            }
          }
        },
        {
          "title": "Circuit Breaker Rejections",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 8, "x": 8, "y": 24 },
          "targets": [
            {
              "expr": "sum(rate(aigateway_circuit_breaker_rejections_total[5m])) by (provider)",
              "legendFormat": "{{provider}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 20 }
            }
          }
        },
        {
          "title": "Rate Limit Rejections",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 30 },
          "targets": [
            {
              "expr": "sum(rate(aigateway_ratelimit_rejected_total[5m])) by (key_type)",
              "legendFormat": "{{key_type}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 20 }
            }
          }
        },
        {
          "title": "Fallback Activations",
          "type": "timeseries",
          "gridPos": { "h": 6, "w": 12, "x": 12, "y": 30 },
          "targets": [
            {
              "expr": "sum(rate(aigateway_router_fallback_total[5m])) by (model, primary_provider, fallback_provider)",
              "legendFormat": "{{model}}: {{primary_provider}} -> {{fallback_provider}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10 }
            }
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["ai-gateway"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "AI Gateway Dashboard",
      "uid": "ai-gateway",
      "version": 1
    }
