apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: ai-gateway
  labels:
    app.kubernetes.io/name: grafana
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: "AI Gateway"
        orgId: 1
        folder: "AI Gateway"
        type: file
        disableDeletion: false
        updateIntervalSeconds: 10
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false
