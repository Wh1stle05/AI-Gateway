server:
  addr: ":8080"

gateway:
  api_key: ${GATEWAY_API_KEY}

metrics:
  enabled: true
  path: /metrics

rate_limit:
  enabled: true
  redis_url: redis://127.0.0.1:6379/0
  requests_per_minute: 120
  burst: 20

circuit_breaker:
  enabled: true
  failure_threshold: 5
  open_timeout: 30s
  half_open_max_requests: 2

providers:
  - name: openai
    type: openai
    base_url: https://api.openai.com/v1
    api_key: ${OPENAI_API_KEY}
    timeout: 120s
    models:
      - gpt-4o-mini
      - gpt-4o

  - name: ollama
    type: openai
    base_url: http://127.0.0.1:11434/v1
    timeout: 120s
    models:
      - llama3.2
      - qwen2.5

  - name: mock
    type: mock
    models:
      - mock-model

routing:
  - model: gpt-4o-mini
    provider: openai
    fallback: mock
  - model: llama3.2
    provider: ollama
    fallback: mock
  - model: mock-model
    provider: mock
